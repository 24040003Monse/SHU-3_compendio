<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mashup Dashboard - 6 APIs Integradas</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
</head>
<body>
    <div class="orb-center"></div>
    <div class="dashboard">
        <h1>🌐 Mashup Dashboard - 6 APIs en una sola pantalla</h1>
        <div class="grid-container">

            <!-- 1. Geolocalización -->
            <div class="card" id="card-geo">
                <h2>📍 Geolocalización - OpenStreetMap</h2>
                <div id="map"></div>
                <div class="map-controls">
                    <button class="btn" id="miUbicacionBtn">📍 Mi ubicación</button>
                    <button class="btn" id="buscarCiudadBtn">🔍 Buscar ciudad</button>
                </div>
                <input type="text" id="cityInput" placeholder="Nombre de la ciudad..." class="input-field">
                <p id="coordinates" class="coordinates-text"></p>
            </div>

            <!-- 2. Redes Sociales -->
            <div class="card" id="card-sociales">
                <h2>📱 Redes Sociales</h2>
                <p>Cargando...</p>
            </div>

            <!-- 3. E-commerce -->
            <div class="card" id="card-ecommerce">
                <h2>🛒 E-commerce</h2>
                <p>Cargando...</p>
            </div>

            <!-- 4. Base de datos -->
            <div class="card" id="card-database">
                <h2>💾 Base de datos - Cloud Storage</h2>
                <div class="user-form">
                    <input type="text" id="username" placeholder="Nombre de usuario" class="input-field">
                    <button class="btn btn-small" id="guardarUsuarioBtn">Guardar en la nube</button>
                </div>
                <div id="userList" class="user-list">
                    <p>Cargando usuarios...</p>
                </div>
            </div>

            <!-- 5. SMS -->
            <div class="card" id="card-sms">
                <h2>📨 Protocolos - Simulador SMS</h2>
                <div class="sms-simulator">
                    <div class="sms-form">
                        <input type="text" id="phoneNumber" placeholder="Número de teléfono" class="input-field">
                        <textarea id="smsMessage" rows="2" placeholder="Mensaje SMS..." class="input-field"></textarea>
                        <button class="btn btn-small" id="enviarSMSBtn">Enviar SMS</button>
                    </div>
                    <div id="smsLog" class="sms-log">
                        <p>Registro de mensajes...</p>
                    </div>
                </div>
            </div>

            <!-- 6. Streaming -->
            <div class="card" id="card-streaming">
                <h2>🎬 Streaming - YouTube Player</h2>
                <div id="playerContainer"></div>
                <p id="statusText" class="status-text">
                    <span class="status-indicator status-offline"></span>
                    YouTube Player
                </p>
            </div>

        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
    <script src="js/app.js" type="module"></script>
</body>
</html>
